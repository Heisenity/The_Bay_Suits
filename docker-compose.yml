services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bay
      POSTGRES_PASSWORD: bay
      POSTGRES_DB: bay_suites
    ports:
      - "5432:5432"
    volumes:
      - bay_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bay -d bay_suites"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bay_postgres:

